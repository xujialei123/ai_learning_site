<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
<rect width="1500" height="900" fill="#f8fafc"/>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker></defs>
<style>.t{font-family:Arial,'Microsoft YaHei';fill:#0f172a}.s{font-family:Arial,'Microsoft YaHei';fill:#475569;font-size:15px}.l{stroke:#94a3b8;stroke-width:2;marker-end:url(#a)}</style>
<text x="60" y="60" class="t" font-size="34" font-weight="700">真实项目里的后端与 AI 应用知识系统</text>
<text x="60" y="95" class="s">从用户请求到业务处理、数据存储、AI推理、工具调用、质量评估、部署监控的完整链路</text>
<g>
<rect x="60" y="160" width="180" height="78" rx="18" fill="#dbeafe"/><text x="95" y="194" class="t" font-size="22" font-weight="700">前端后台</text><text x="88" y="220" class="s">页面/状态/交互</text>
<rect x="290" y="160" width="180" height="78" rx="18" fill="#e0f2fe"/><text x="330" y="194" class="t" font-size="22" font-weight="700">HTTP/API</text><text x="325" y="220" class="s">REST/SSE/Webhook</text>
<rect x="520" y="160" width="180" height="78" rx="18" fill="#dcfce7"/><text x="553" y="194" class="t" font-size="22" font-weight="700">后端分层</text><text x="548" y="220" class="s">Controller/Service</text>
<rect x="750" y="160" width="180" height="78" rx="18" fill="#fef3c7"/><text x="792" y="194" class="t" font-size="22" font-weight="700">权限安全</text><text x="783" y="220" class="s">JWT/RBAC/租户</text>
<rect x="980" y="160" width="180" height="78" rx="18" fill="#fee2e2"/><text x="1023" y="194" class="t" font-size="22" font-weight="700">日志监控</text><text x="1010" y="220" class="s">requestId/metrics</text>
<rect x="180" y="340" width="180" height="78" rx="18" fill="#ffedd5"/><text x="220" y="374" class="t" font-size="22" font-weight="700">数据库</text><text x="205" y="400" class="s">表/索引/事务</text>
<rect x="430" y="340" width="180" height="78" rx="18" fill="#fde68a"/><text x="478" y="374" class="t" font-size="22" font-weight="700">Redis</text><text x="460" y="400" class="s">缓存/限流/锁</text>
<rect x="680" y="340" width="180" height="78" rx="18" fill="#fce7f3"/><text x="724" y="374" class="t" font-size="22" font-weight="700">队列Worker</text><text x="714" y="400" class="s">异步/重试/死信</text>
<rect x="930" y="340" width="180" height="78" rx="18" fill="#ede9fe"/><text x="975" y="374" class="t" font-size="22" font-weight="700">对象存储</text><text x="970" y="400" class="s">PDF/图片/附件</text>
<rect x="1180" y="340" width="180" height="78" rx="18" fill="#ccfbf1"/><text x="1227" y="374" class="t" font-size="22" font-weight="700">搜索/向量</text><text x="1215" y="400" class="s">全文/Embedding</text>
<rect x="180" y="550" width="180" height="78" rx="18" fill="#e0e7ff"/><text x="230" y="584" class="t" font-size="22" font-weight="700">Prompt</text><text x="205" y="610" class="s">上下文/结构化输出</text>
<rect x="430" y="550" width="180" height="78" rx="18" fill="#d9f99d"/><text x="477" y="584" class="t" font-size="22" font-weight="700">RAG</text><text x="456" y="610" class="s">切片/检索/引用</text>
<rect x="680" y="550" width="180" height="78" rx="18" fill="#bae6fd"/><text x="730" y="584" class="t" font-size="22" font-weight="700">Agent</text><text x="714" y="610" class="s">工具调用/审批</text>
<rect x="930" y="550" width="180" height="78" rx="18" fill="#fecdd3"/><text x="977" y="584" class="t" font-size="22" font-weight="700">AI评估</text><text x="960" y="610" class="s">准确/拒答/幻觉</text>
<rect x="1180" y="550" width="180" height="78" rx="18" fill="#ddd6fe"/><text x="1227" y="584" class="t" font-size="22" font-weight="700">护栏风控</text><text x="1210" y="610" class="s">注入/隐私/成本</text>
<rect x="470" y="750" width="220" height="82" rx="20" fill="#0f172a"/><text x="523" y="786" fill="#fff" font-family="Arial" font-size="24" font-weight="700">架构设计</text><text x="505" y="815" fill="#cbd5e1" font-family="Arial" font-size="15">模块/降级/扩展</text>
<rect x="780" y="750" width="220" height="82" rx="20" fill="#1e293b"/><text x="833" y="786" fill="#fff" font-family="Arial" font-size="24" font-weight="700">部署交付</text><text x="813" y="815" fill="#cbd5e1" font-family="Arial" font-size="15">Docker/Nginx/CI</text>
